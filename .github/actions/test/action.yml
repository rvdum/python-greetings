name: "Execute API Tests for Python Greetings App"
description: "Composite action to execute API tests for the Python Greetings App"
inputs:
  ENV_NAME:
    description: "The target environment for deployment"
    required: true
runs:
  using: "composite"
  steps:
    - name: Pull latest Docker image for API Tests
      run: docker pull radud1337/api-tests:latest
      shell: bash
    - name: Run API Tests for Python Greetings App
      run: docker run --network=host --rm radud1337/api-tests:latest run greetings greetings_${{ inputs.ENV_NAME }}
      shell: bash
