name: "Build and push Docker image"
description: "Composite action to build and push Docker image to Docker Hub"
runs:
  using: "composite"
  steps:
    - name: Build Docker image for Python Greetings App
      run: docker build -t radud1337/python-greetings-app:latest .
      shell: bash
    - name: Push Docker image to Docker Hub
      run: docker push radud1337/python-greetings-app:latest
      shell: bash
