name: Build and Test Python Microservice pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-docker-image:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build
  deploy-to-dev:
    runs-on: self-hosted
    needs: build-docker-image
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          ENV_NAME: "dev"

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    env:
      ENV_NAME: dev
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests on DEV Environment
        run: |
          echo "Running tests on DEV environment..."
          docker pull radud1337/api-tests:latest
          docker run --network=host --rm radud1337/api-tests:latest run greetings greetings_${ENV_NAME}

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          ENV_NAME: "stg"

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    env:
      ENV_NAME: stg
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests on STG Environment
        run: |
          echo "Running tests on STG environment..."
          docker pull radud1337/api-tests:latest
          docker run --network=host --rm radud1337/api-tests:latest run greetings greetings_${ENV_NAME}

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/deploy
        with:
          ENV_NAME: "prod"

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    env:
      ENV_NAME: prod
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests on PROD Environment
        run: |
          echo "Running tests on PROD environment..."
          docker pull radud1337/api-tests:latest
          docker run --network=host --rm radud1337/api-tests:latest run greetings greetings_${ENV_NAME}
